<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe modifié - Covoit.Africa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --color-earth: #D95D39; --color-night: #1A1A1A; --color-bg: #FAF6ED; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--color-bg); color: var(--color-night); padding: 40px 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 420px; width: 100%; }
        .form-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #F1EFE9; text-align: center; }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 12px; color: var(--color-night); }
        .subtitle { color: #666; margin-bottom: 28px; font-size: 15px; line-height: 1.5; }
        .links { margin-top: 24px; font-size: 15px; color: #555; }
        .links a { color: var(--color-earth); font-weight: 600; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .back { display: inline-block; margin-bottom: 20px; color: var(--color-earth); font-weight: 600; text-decoration: none; }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'covoiturage:landing' %}" class="back">← Accueil</a>
        <div class="form-container">
            <h1>Mot de passe modifié</h1>
            <p class="subtitle">Votre mot de passe a bien été réinitialisé. Vous pouvez maintenant vous connecter.</p>
            <p class="links"><a href="{% url 'login' %}">Se connecter</a></p>
        </div>
    </div>
</body>
</html>
