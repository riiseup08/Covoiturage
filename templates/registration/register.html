<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Covoit.Africa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-earth: #D95D39; /* Ocre / Latérite */
            --color-earth-dark: #A64426;
            --color-sun: #F2A65A;
            --color-night: #1A1A1A;
            --color-bg: #FAF6ED;    /* Sable clair */
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-night);
            display: flex;
            min-height: 100vh;
            /* Animation d'entrée douce */
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Split-screen : Moitié Image / Moitié Formulaire */
        .split-layout {
            display: flex;
            width: 100%;
        }

        /* Moitié gauche : Image dynamique de l'Afrique */
        .image-side {
            flex: 1;
            background-image: url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
        }

        .image-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(26,26,26,0.9) 0%, rgba(26,26,26,0.2) 100%);
        }

        .image-text {
            position: relative;
            z-index: 10;
            color: white;
        }

        .image-text h2 {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .image-text p {
            font-size: 18px;
            color: #ddd;
            max-width: 400px;
        }

        /* Moitié droite : Le Formulaire */
        .form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: white;
            position: relative;
        }

        /* Le motif traditionnel discret en fond du formulaire */
        .african-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--color-sun) 2px, transparent 2px);
            background-size: 40px 40px;
            opacity: 0.05;
            pointer-events: none;
        }

        .logo-small {
            position: absolute;
            top: 40px; right: 40px;
            font-size: 20px; font-weight: 900; color: var(--color-night);
            text-decoration: none; z-index: 10;
        }
        .logo-small span { color: var(--color-earth); }

        .form-container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        .form-container h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--color-night);
        }

        .form-container p.subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }

        /* Style des champs du formulaire Django */
        .form-container form p {
            margin-bottom: 20px;
            width: 100%;
        }

        .form-container label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--color-night);
            font-size: 14px;
        }

        .form-container input[type="text"],
        .form-container input[type="password"],
        .form-container input[type="email"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #EBE5D9;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            background-color: #FAFAFA;
            transition: all 0.3s ease;
        }

        .form-container input:focus {
            outline: none;
            border-color: var(--color-earth);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(217, 93, 57, 0.1);
        }

        /* Aide textuelle de Django (ex: mot de passe trop court) */
        .helptext {
            display: block;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* Bouton de soumission stylé */
        .btn-submit {
            width: 100%;
            background-color: var(--color-earth);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(217, 93, 57, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--color-earth-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(217, 93, 57, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 30px;
            font-weight: 500;
            color: #666;
        }

        .login-link a {
            color: var(--color-earth);
            text-decoration: none;
            font-weight: 700;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Liste d'erreurs Django */
        ul.errorlist {
            list-style: none;
            color: #D32F2F;
            font-size: 13px;
            margin-top: 5px;
            padding: 10px;
            background: #FDECEA;
            border-radius: 6px;
            border-left: 4px solid #D32F2F;
        }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .split-layout { flex-direction: column; }
            .image-side { display: none; /* Cache l'image sur mobile pour faire place au formulaire */ }
            .form-side { padding: 40px 20px; min-height: 100vh; justify-content: flex-start; padding-top: 100px; }
            .logo-small { top: 20px; right: 20px; left: 20px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="split-layout">
        <!-- Partie Gauche (Image) -->
        <div class="image-side">
            <div class="image-overlay"></div>
            <div class="image-text">
                <h2>Rejoignez le mouvement.</h2>
                <p>Des milliers de trajets partagés chaque jour à travers tout le continent.</p>
            </div>
        </div>

        <!-- Partie Droite (Formulaire) -->
        <div class="form-side">
            <div class="african-pattern"></div>
            <a href="{% url 'covoiturage:landing' %}" class="logo-small">COVOIT<span>.</span>AFRICA</a>
            
            <div class="form-container">
                <h1>Créer un compte</h1>
                <p class="subtitle">Prêt à prendre la route ? C'est gratuit et ça prend 1 minute.</p>
                
                <!-- Formulaire Django Automatique -->
                <form method="POST">
                    {% csrf_token %}
                    
                    {{ form.as_p }}
                    
                    <button type="submit" class="btn-submit">S'inscrire</button>
                </form>

                <div class="login-link">
                    Déjà membre ? <a href="{% url 'login' %}">Connectez-vous ici</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
