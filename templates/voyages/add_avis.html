<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noter {{ utilisateur_note.username }} - Covoit.Africa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --color-earth: #D95D39; --color-night: #1A1A1A; --color-bg: #FAF6ED; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--color-bg); color: var(--color-night); padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 520px; margin: 0 auto; }
        .header { margin-bottom: 25px; }
        h1 { font-size: 24px; font-weight: 800; color: var(--color-night); }
        .form-container { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        select, textarea { width: 100%; padding: 14px; border: 2px solid #EBE5D9; border-radius: 8px; font-size: 16px; font-family: 'Outfit', sans-serif; }
        textarea { min-height: 100px; resize: vertical; }
        select:focus, textarea:focus { outline: none; border-color: var(--color-earth); }
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn { padding: 14px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; font-family: 'Outfit'; }
        .btn-cancel { background: #F1EFE9; color: var(--color-night); }
        .btn-submit { background: var(--color-earth); color: white; }
        ul.errorlist { color: #D32F2F; font-size: 13px; list-style: none; margin-top: 5px; padding: 0; }
        .recap { background: #F8F6F2; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 15px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Noter {{ utilisateur_note.username }}</h1>
            <a href="{% url 'covoiturage:avis_list' %}" style="color: var(--color-earth); font-weight: 600;">← Retour aux avis</a>
        </div>
        <div class="form-container">
            <p class="recap">Trajet : <strong>{{ voyage.ville_depart }} → {{ voyage.ville_arrivee }}</strong> ({{ voyage.date_depart|date:"d M Y" }})</p>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_note">Note (1 à 5)</label>
                    {{ form.note }}
                    {{ form.note.errors }}
                </div>
                <div class="form-group">
                    <label for="id_commentaire">Commentaire (optionnel)</label>
                    {{ form.commentaire }}
                    {{ form.commentaire.errors }}
                </div>
                <div class="btn-group">
                    <a href="{% url 'covoiturage:avis_list' %}" class="btn btn-cancel">Annuler</a>
                    <button type="submit" class="btn btn-submit">Publier l'avis</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
